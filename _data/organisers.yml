# =============================================================
#  Organisers — the people who run MCC nights.
#
#  Each "- name:" block is one organiser and becomes a card on
#  the "Meet your Organisers" page. Copy a whole block (from
#  "- name:" down to its "bio:") and paste it below to add more.
#
#  Fields:
#    name    – the organiser's name (or nickname)
#    photo   – path to their photo IN THIS REPO, e.g.
#              /assets/img/organisers/alex.jpg
#              Drop the image file into assets/img/organisers/ and
#              point to it here. Leave blank ("") to show a generic
#              placeholder silhouette instead.
#              ► Photos are shown at a fixed square size and cropped
#                to fit (centred), so they all look uniform even if
#                your source images differ a little. For best results
#                use a roughly square image, ~400x400px or larger.
#    discord    – their Discord handle, shown as a tag (e.g. "@name").
#                 Leave blank ("") to hide the tag entirely.
#    discord_id – their numeric Discord user ID. When set, the handle
#                 links straight to their profile
#                 (https://discord.com/users/<id>). Leave blank ("")
#                 and the handle just shows as plain text (no link).
#                 To get an ID: turn on Discord's Developer Mode
#                 (Settings ▸ Advanced), then right-click a user ▸
#                 "Copy User ID".
#    bio        – a short blurb. Plain text; you can also use **bold**
#                 or a [link](https://...) if you like.
# =============================================================

