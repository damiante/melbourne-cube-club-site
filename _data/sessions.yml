# =============================================================
#  Sessions — the recurring events MCC runs.
#
#  Each "- name:" block is one event. We run a single weekly
#  event today, but you can add as many as you like: copy a
#  whole block (from "- name:" down to its "note:") and paste
#  it below, then edit the details.
#
#  Fields:
#    name  – what you call this event
#    day   – the day it runs (e.g. Tuesday)
#    time  – start time, written however you like ("6:30 PM")
#    venue.name – the shop / place name
#    venue.url  – a link to that place (maps, website, etc.)
#    signup_url – where players sign up for THIS session (a Discord
#                 event, a form, etc.). This is the big "Sign up"
#                 button. If you leave it out, the button falls back
#                 to the Discord invite from _config.yml.
#    note  – optional short line under the venue (leave blank
#            with "" or delete the line to hide it)
# =============================================================

- name: Thursday Night Cube
  day: Thursday
  time: "6:15 PM"
  venue:
    name: Plenty of Games CBD
    url: "https://maps.app.goo.gl/CHBitAcA4krtBhQCA" 
  signup_url: "https://discordapp.com/channels/1477819996095905804/1477820156557398149"  
  note: "Our primary event - same day & time every week"


- name: Daytime cubing
  day: Sporadic
  time: "Start time varies"
  venue:
    name: Plenty of Games CBD
    url: "https://maps.app.goo.gl/CHBitAcA4krtBhQCA"
  signup_url: "https://discordapp.com/channels/1477819996095905804/1521007016435515502"
  note: "Spontaneous mid-day cubing; check the channel for event details!"
